version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:latest
    container_name: pulse-chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # Backend Node.js API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulse-chat-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/pulse-chat
      # Pulling the rest of the secrets from the local backend env file
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: unless-stopped

  # Frontend React SPA (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulse-chat-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
